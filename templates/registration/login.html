{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Samudra Thali ERP Login</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            background:
                linear-gradient(rgba(0, 0, 0, 0.55),
                    rgba(0, 0, 0, 0.55)),

                url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');

            background-size: cover;
            background-position: center;
        }

        .login-container {

            width: 100%;
            max-width: 420px;

            background: rgba(255, 255, 255, 0.12);

            backdrop-filter: blur(12px);

            border: 1px solid rgba(255, 255, 255, 0.2);

            border-radius: 20px;

            padding: 40px;

            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);

            color: white;
        }

        .login-container h1 {

            text-align: center;

            margin-bottom: 10px;

            font-size: 32px;

            font-weight: 700;
        }

        .subtitle {

            text-align: center;

            margin-bottom: 30px;

            opacity: 0.85;

            font-size: 14px;
        }

        .form-group {

            margin-bottom: 20px;
        }

        .form-group label {

            display: block;

            margin-bottom: 8px;

            font-size: 14px;
        }

        .form-control {

            width: 100%;

            padding: 14px;

            border: none;

            border-radius: 12px;

            outline: none;

            background: rgba(255, 255, 255, 0.18);

            color: white;

            font-size: 15px;
        }

        .form-control::placeholder {

            color: #eee;
        }

        .login-btn {

            width: 100%;

            padding: 14px;

            border: none;

            border-radius: 12px;

            background: #00b894;

            color: white;

            font-size: 16px;

            font-weight: 600;

            cursor: pointer;

            transition: 0.3s;
        }

        .login-btn:hover {

            background: #019875;
        }

        .footer-text {

            text-align: center;

            margin-top: 20px;

            font-size: 13px;

            opacity: 0.8;
        }

        .errorlist {

            list-style: none;

            color: #ffb3b3;

            margin-bottom: 10px;
        }
    </style>

</head>

<body>

    <div class="login-container">

        <h1>
            SAMUDRA THALI RESTAURANT ERP
        </h1>

        <p class="subtitle">

            Restaurant Management & Accounting System

        </p>

        <form method="POST">

            {% csrf_token %}

            {{ form.non_field_errors }}

            <div class="form-group">

                <label>
                    Username
                </label>

                <input type="text" name="username" class="form-control" placeholder="Enter Username" required>

            </div>

            <div class="form-group">

                <label>
                    Password
                </label>

                <input type="password" name="password" class="form-control" placeholder="Enter Password" required>

            </div>

            <button type="submit" class="login-btn">

                Login to Dashboard

            </button>

        </form>

        <div class="footer-text">

            Coastal Pearl Restaurant ERP System

        </div>

    </div>

</body>

</html>
